name: Pipeline DevSecOps - Scans, Build, Sign & Notify

on:
  push:
    branches: [ "main", "master" ]

# OBLIGATOIRE : Donne les droits d'écriture à la VM pour générer les rapports et signer avec Cosign
permissions:
  contents: write
  id-token: write

jobs:
  devsecops_pipeline:
    name: Chaîne de Sécurité & Signature
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code source
      uses: actions/checkout@v4

    # ==========================================
    # ÉTAPE 1 : SCANS DE SÉCURITÉ (Génération des JSON)
    # ==========================================
    - name: Scanner le code source (Semgrep SAST)
      run: |
        pip install semgrep
        semgrep scan --json --output=semgrep-results.json || true
      env:
        SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    - name: Configurer Snyk CLI
      uses: snyk/actions/setup@master
    - name: Scanner les dépendances (Snyk SCA)
      run: snyk test --json-file-output=snyk-results.json || true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # --- CORRECTION DE L'ERREUR MAVEN 429 ---
    - name: Configurer Java et charger les dépendances Maven
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17' # Modifie par la version Java de ton projet si nécessaire (11, 21, etc.)
        cache: 'maven'

    # Résout les dépendances localement avant que Trivy ne passe pour éviter les requêtes HTTP bloquantes
    - name: Télécharger les dépendances Maven (Mode Offline Préparation)
      run: mvn dependency:go-offline || true

    - name: Scanner la configuration et fichiers (Trivy)
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'json'
        output: 'trivy-results.json'
        exit-code: '0'
        # Force Trivy à utiliser le cache Maven local pour ne pas interroger les dépôts distants
        trivy-config: |
          scan:
            maven:
              offline: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ==========================================
    # ÉTAPE 2 : LOGINS, BUILD DOCKER & REGISTRY
    # ==========================================
    - name: Connexion à Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construire et Pousser l'image Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Utilise automatiquement le nom d'utilisateur configuré par Ziyad
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/discovery-service:latest # <-- Modifie "discovery-service" pour tes autres dépôts !

    # ==========================================
    # ÉTAPE 3 : SIGNATURE NUMÉRIQUE COSIGN
    # ==========================================
    - name: Installer Cosign dans la VM Actions
      uses: sigstore/cosign-installer@v3.5.0

    - name: Signer l'image Docker publiée
      run: |
        cosign sign --yes --key env://COSIGN_PRIVATE_KEY ${{ secrets.DOCKERHUB_USERNAME }}/discovery-service:latest
      env:
        COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_KEY }}
        COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

    # ==========================================
    # ÉTAPE 4 : ANALYSE DES RESULTATS & ALERTE BOT TELEGRAM
    # ==========================================
    - name: Configurer l'environnement Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Exécuter le Script d'Analyse et Envoi Telegram
      run: |
        pip install requests
        python security-notify.py
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
